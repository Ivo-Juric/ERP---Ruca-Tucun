<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Fondo negro -->
  <rect width="512" height="512" rx="80" fill="#1A1A1A"/>

  <!-- Estrella de 8 puntas en ruca-yellow (#D4B000) -->
  <!-- Capa 1: estrella de 4 puntas alineada a los ejes -->
  <polygon
    points="256,60 284,224 448,256 284,288 256,452 228,288 64,256 228,224"
    fill="#D4B000"
  />
  <!-- Capa 2: misma estrella rotada 45° -->
  <polygon
    points="256,60 284,224 448,256 284,288 256,452 228,288 64,256 228,224"
    fill="#D4B000"
    transform="rotate(45 256 256)"
  />

  <!-- Círculo central -->
  <circle cx="256" cy="256" r="38" fill="#1A1A1A"/>
  <circle cx="256" cy="256" r="26" fill="#D4B000"/>
</svg>
